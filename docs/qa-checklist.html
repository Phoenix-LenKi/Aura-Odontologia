<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>QA Checklist</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #fff; max-width: 600px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        .checkbox { margin-bottom: 10px; font-size: 16px; }
        input[type="checkbox"] { transform: scale(1.5); margin-right: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Checklist de Lançamento (QA)</h1>
    <div class="checkbox"><label><input type="checkbox"> Todos os links de contato apontam pros telefones e emails corretos?</label></div>
    <div class="checkbox"><label><input type="checkbox"> Layout 100% responsivo em iPhone (375px) e Android (360px)?</label></div>
    <div class="checkbox"><label><input type="checkbox"> Ícones de especialidades estão condizentes com as áreas (Implantes, Odontopediatria)?</label></div>
    <div class="checkbox"><label><input type="checkbox"> Cores batem com as restrições da área de saúde (tons que passam higiene e confiança)?</label></div>
    <div class="checkbox"><label><input type="checkbox"> Nomes completos e números do CRO das doutoras batem com a base?</label></div>
    <div class="checkbox"><label><input type="checkbox"> O build não possui erros de hydration?</label></div>
</body>
</html>
